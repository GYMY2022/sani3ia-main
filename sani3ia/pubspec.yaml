name: snae3ya
description: تطبيق صنايعية للخدمات المنزلية

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # الحزم الأساسية
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.0
  uuid: ^4.5.1
  supabase_flutter: ^2.1.1
  path: ^1.8.3
  mime: ^2.0.0
  onesignal_flutter: ^5.2.0 
  http: ^1.1.0

  # التوطين واللغات
  flutter_localizations:
    sdk: flutter
  easy_localization: ^3.0.3

  # المصادقة البيومترية
  local_auth: ^2.1.7

  # إدارة الأذونات
  permission_handler: ^12.0.1

  # الإشعارات (محلية فقط بدون Firebase)
  flutter_local_notifications: ^19.0.0

  # حزم نظام المحفظة
  provider: ^6.1.5
  fluttertoast: ^9.0.0
  intl_phone_number_input: ^0.7.0+2
  money2: ^6.0.5

  # حزم إضافية
  rxdart: ^0.28.0
  flutter_cache_manager: ^3.3.1

  # حزم مشاركة وفتح الروابط
  url_launcher: ^6.2.0  # ⭐⭐ هذه الحزمة ضرورية للملاحة
  share_plus: ^12.0.1

  # حزم التاريخ والترجمة
  intl: ^0.20.2

  # حزم Firebase متوافقة ومستقرة
  firebase_core: ^4.2.0
  cloud_firestore: ^6.0.3
  firebase_storage: ^13.0.3
  firebase_messaging: ^16.0.3
  firebase_auth: ^6.1.1

  # ⭐⭐ حزم الوسائط الأساسية ⭐⭐
  image_picker: ^1.2.0
  video_player: ^2.8.3
  chewie: ^1.7.5
  path_provider: ^2.1.0
  open_file: ^3.3.3
  
  # ⭐⭐ حزم إضافية للوسائط ⭐⭐
  photo_view: ^0.15.0
  image: ^4.2.0

  # ⭐⭐ حزم الخرائط وتحديد المواقع ⭐⭐
  google_maps_flutter: ^2.5.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  google_sign_in: ^5.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.0
  build_runner: ^2.7.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/user_profile.png
    - assets/images/carpenter_category.png
    - assets/images/plumber_category.png
    - assets/images/electrician_category.png
    - assets/images/builder_category.png
    - assets/images/painter_category.png
    - assets/images/ac_technician_category.png
    - assets/images/mechanic_category.png
    - assets/images/blacksmith_category.png
    - assets/images/door1.jpg
    - assets/products/
    - assets/translations/
    
    # ⭐ أضف هذه الصور الافتراضية للمحادثات (تأكد من وجودها فعلاً)
    - assets/images/default_profile.png
    - assets/images/default_job_1.png